# Build/test/publish for redact. The shared build/publish/version logic lives in
# desert-ant-core's model-SDK catalog (mise-tasks/model-sdk.toml, pinned below);
# this file supplies redact's config and its model-specific test tasks. See the
# catalog README for the full task list and the mise.local.toml secret setup.
[tools]
swift = "6.3.3"

[vars]
model = "redact"
product = "Redact"
tflite_files = "redact.tflite redact_tokenizer.bin labels.json"

[env]
DAL_GPU = ""

[task_config]
includes = ["git::https://github.com/Desert-Ant-Labs/desert-ant-core.git//sdk-build/model-sdk.toml?ref=v0.4.1"]

# Test harnesses are model-specific, so they stay local (test-swift and
# test-android come from the catalog).
[tasks.test]
description = "Run every test suite (swift + web + android)"
depends = ["test-swift", "test-web", "test-android"]

[tasks.test-web]
description = "npm suite for packages/redact-node (server-side native core; browser path is the headless-Chromium example)"
dir = "{{ config_root }}/packages/redact-node"
depends = ["build-web", "node-natives"]
tools = { node = "22" }
run = "npm test"
